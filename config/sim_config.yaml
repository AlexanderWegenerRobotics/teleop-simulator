rendering:
  enabled: true
  fps: 30

simulation:
  timestep: 0.001
  control_frequency: 1000
  model_path: "../models/mujoco/scenes/world_scene.xml"

devices:
  - name: arm_left
    model_path: "../models/mujoco/robots/franka_fr3/fr3_torque.xml"
    urdf_path: "../models/urdf/franka_fr3/panda.urdf"
    root_body: "link0"
    urdf_ee_name: "fr3_link8"
    gripper_actuator: "actuator8"

  - name: right_arm
    model_path: "../models/mujoco/robots/franka_fr3/fr3_torque.xml"
    urdf_path: "../models/urdf/franka_fr3/panda.urdf"
    root_body: "link0"
    urdf_ee_name: "fr3_link8"
    gripper_actuator: "actuator8"

  - name: head
    model_path: "../models/mujoco/robots/pan_tilt_dummy/pan_tilt_dummy.xml"
    root_body: "base"

objects:
  - name: table
    type: static
    model_path: "../models/mujoco/props/table.xml"
    pose:
      position: [0, 0, 0]
      orientation: [1, 0, 0, 0]

  - name: right_base_frame
    type: visual
    model_path: "../models/mujoco/props/coordinate_frame.xml"
    pose:
      position: [0, -0.6, 0.8]
      orientation: [0.5, 0.5, 0.5, 0.5]

  - name: left_base_frame
    type: visual
    model_path: "../models/mujoco/props/coordinate_frame.xml"
    pose:
      position: [0, 0.6, 0.8]
      orientation: [0.5, -0.5,  0.5, -0.5]

cameras:
  - name: workspace_overview_1
    enabled: False
    type: fixed
    pos: [1.5, 0, 0.8]
    look_at: [0.4, 0.0, 0.4]
    fovy: 90

  - name: workspace_overview_2
    enabled: False
    type: fixed
    pos: [0.3, 0.3, 1.9]
    look_at: [0.0, 0.0, 0.4]
    fovy: 90

  - name: workspace_overview_3
    enabled: False
    type: fixed
    pos: [0.5, 0.3, 0.9]
    look_at: [0.5, 0.0, 0.7]
    fovy: 90